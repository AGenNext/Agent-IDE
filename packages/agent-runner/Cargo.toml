[package]
name    = "agent-runner"
version = "0.1.0"
edition = "2021"
description = "Autonomyx runtime core — native everywhere (server, edge, home, embedded)"

[[bin]]
name = "autonomyx-runner"
path = "src/main.rs"

[dependencies]
# Transport
axum              = { version = "0.7",  features = ["ws", "macros"] }
axum-extra        = { version = "0.9",  features = ["typed-header"] }
tower             = { version = "0.4", features = ["timeout", "limit"] }
tower-http        = { version = "0.5", features = ["cors", "trace", "timeout", "limit", "catch-panic"] }
tokio             = { version = "1",   features = ["full"] }
tokio-tungstenite = "0.21"

# Serialization
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"

# HTTP client (LLM + peer calls)
reqwest     = { version = "0.12", features = ["json", "stream"] }

# IDs + time
uuid        = { version = "1", features = ["v4"] }
chrono      = { version = "0.4", features = ["serde"] }

# Cryptographic hashing — trust chain (SHA-256 per gate link)
sha2        = "0.10"
hex         = "0.4"

# Async utilities
futures     = "0.3"
tokio-stream = "0.1"
async-stream  = "0.3"
urlencoding   = "2"
clap          = { version = "4", features = ["derive"] }
anyhow        = "1"
async-trait   = "0.1"

# ConfigDB — SurrealDB (embedded memory/RocksDB or remote cluster)
# Features: kv-mem (dev), kv-rocksdb (device/home server), native-tls (remote)
# "native everywhere": same crate compiles for Linux/macOS/Windows/WASM
surrealdb = { version = "1", default-features = false, features = ["kv-mem", "kv-rocksdb"] }

# Tracing
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[profile.release]
opt-level = 3
lto       = true
codegen-units = 1
strip     = true
