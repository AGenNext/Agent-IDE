{{- if .Values.ide.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-ide.fullname" . }}-ide
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-ide.labels" . | nindent 4 }}
    app.kubernetes.io/component: ide
spec:
  replicas: {{ .Values.ide.replicaCount }}
  selector:
    matchLabels:
      {{- include "agent-ide.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ide
  template:
    metadata:
      labels:
        {{- include "agent-ide.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ide
    spec:
      serviceAccountName: {{ include "agent-ide.serviceAccountName" . }}
      containers:
        - name: ide
          image: "{{ if .Values.global.image.registry }}{{ .Values.global.image.registry }}/{{ end }}{{ .Values.ide.image.repository }}:{{ .Values.ide.image.tag }}"
          imagePullPolicy: {{ .Values.global.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: BACKEND_URL
              value: "http://{{ include "agent-ide.fullname" . }}-backend:3001"
            - name: NODE_ENV
              value: "production"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          resources:
            {{- toYaml .Values.ide.resources | nindent 12 }}
      {{- with .Values.ide.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ide.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ide.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
