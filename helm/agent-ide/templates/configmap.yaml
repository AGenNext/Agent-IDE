apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-ide.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-ide.labels" . | nindent 4 }}
data:
  PORT: "3001"
  NODE_ENV: "production"
  ALLOW_SHELL: {{ .Values.env.allowShell | quote }}
  AUTH_ENABLED: {{ .Values.env.authEnabled | quote }}
  WORKSPACE_ROOT: "/data"
