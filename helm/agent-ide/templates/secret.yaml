apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent-ide.fullname" . }}-env
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-ide.labels" . | nindent 4 }}
type: Opaque
data:
  OPENAI_API_KEY: {{ .Values.env.openaiApiKey | b64enc | quote }}
  ANTHROPIC_API_KEY: {{ .Values.env.anthropicApiKey | b64enc | quote }}
  BRAVE_API_KEY: {{ .Values.env.braveApiKey | b64enc | quote }}
  DATABASE_URL: {{ .Values.env.databaseUrl | b64enc | quote }}
  GITHUB_TOKEN: {{ .Values.env.githubToken | b64enc | quote }}
  JWT_SECRET: {{ .Values.env.jwtSecret | b64enc | quote }}
  DEMO_PASSWORD: {{ .Values.env.demoPassword | b64enc | quote }}
