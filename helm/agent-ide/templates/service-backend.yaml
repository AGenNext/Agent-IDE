{{- if .Values.backend.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-ide.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-ide.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "agent-ide.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
    - name: websocket
      port: 3002
      targetPort: http
      protocol: TCP
{{- end }}
