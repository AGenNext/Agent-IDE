# Autonomyx End-to-End Delivery — single stack, every pack, nothing missing.
#
# "End to end everything" — this file delivers the complete platform:
#
#   1. Namespace + RBAC
#   2. CRDs (Agent, Application, Gate)
#   3. Platform runtime (autonomyx-runner)
#   4. Zot registry (supply chain)
#   5. ArgoCD application (GitOps sync)
#   6. OTel collector (observability)
#   7. Example agent (kagent-style, Autonomyx-governed)
#   8. Example application (the product)
#
# One command. End to end.
#   kubectl apply -f autonomyx-e2e.yaml
#
# Compare kagent: CRDs + controller only. Autonomyx: DID + gates + fabric + usage + MCP + stream.
# openautonomyx.com

---
# ── Pack 1: Namespace ────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: autonomyx
  labels:
    app.kubernetes.io/name:       autonomyx
    app.kubernetes.io/managed-by: autonomyx
    autonomyx/pack:               core

---
# ── Pack 2: Platform config ──────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: autonomyx-config
  namespace: autonomyx
  labels:
    autonomyx/pack: core
data:
  PORT:              "3001"
  RUST_LOG:          "agent_runner=info,tower_http=warn"
  OTEL_SERVICE_NAME: "autonomyx-runner"
  AGENT_JOB_NAMESPACE: "autonomyx"
  RATE_LIMIT_RPM:    "60"
  REQUEST_TIMEOUT_SECS: "30"
  BODY_LIMIT_BYTES:  "4194304"

---
# ── Pack 3: Secrets (provide your own values) ───────────────────────────────
# kubectl create secret generic autonomyx-secrets -n autonomyx \
#   --from-literal=GATEWAY_API_KEY=$(openssl rand -hex 32) \
#   --from-literal=LLM_API_KEY=<your-key> \
#   --from-literal=ANTHROPIC_API_KEY=<your-key>
apiVersion: v1
kind: Secret
metadata:
  name: autonomyx-secrets
  namespace: autonomyx
  labels:
    autonomyx/pack: core
type: Opaque
data: {}

---
# ── Pack 4: RBAC ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: autonomyx-runner
  namespace: autonomyx
  labels:
    autonomyx/pack: core
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: autonomyx-controller
  labels:
    autonomyx/pack: core
rules:
  # Watch and manage Autonomyx CRDs
  - apiGroups: ["autonomyx.io"]
    resources: ["autonomyxagents", "autonomyxapplications", "autonomyxgates",
                "autonomyxagents/status", "autonomyxapplications/status", "autonomyxgates/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Create Jobs for agent execution (Kubernetes IS the agent runner)
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Read pod logs for observability
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Read ConfigMaps for live config (SurrealDB live queries supplement this)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: autonomyx-controller
  labels:
    autonomyx/pack: core
subjects:
  - kind: ServiceAccount
    name: autonomyx-runner
    namespace: autonomyx
roleRef:
  kind:     ClusterRole
  name:     autonomyx-controller
  apiGroup: rbac.authorization.k8s.io

---
# ── Pack 5: Platform runtime (autonomyx-runner) ───────────────────────────────
# The single binary — all gates, fabric, federation, usage, MCP, stream.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autonomyx-runner
  namespace: autonomyx
  labels:
    app:            autonomyx-runner
    autonomyx/pack: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autonomyx-runner
  template:
    metadata:
      labels:
        app:            autonomyx-runner
        autonomyx/pack: core
    spec:
      serviceAccountName: autonomyx-runner
      containers:
        - name: autonomyx
          image: ghcr.io/agennext/autonomyx:latest
          imagePullPolicy: Always
          ports:
            - name: api
              containerPort: 3001
          envFrom:
            - configMapRef: { name: autonomyx-config }
          env:
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: GATEWAY_API_KEY
              valueFrom: { secretKeyRef: { name: autonomyx-secrets, key: GATEWAY_API_KEY, optional: true } }
            - name: LLM_API_KEY
              valueFrom: { secretKeyRef: { name: autonomyx-secrets, key: LLM_API_KEY, optional: true } }
            - name: ANTHROPIC_API_KEY
              valueFrom: { secretKeyRef: { name: autonomyx-secrets, key: ANTHROPIC_API_KEY, optional: true } }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 2,    memory: 2Gi  }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            runAsNonRoot:             true
            capabilities:             { drop: [ALL] }
          livenessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: autonomyx-runner
  namespace: autonomyx
  labels:
    autonomyx/pack: core
spec:
  selector:
    app: autonomyx-runner
  ports:
    - name: api
      port: 3001
      targetPort: api

---
# ── Pack 6: Zot registry (supply chain — BOM at every gate) ──────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autonomyx-zot
  namespace: autonomyx
  labels:
    app:            autonomyx-zot
    autonomyx/pack: supply-chain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autonomyx-zot
  template:
    metadata:
      labels:
        app:            autonomyx-zot
        autonomyx/pack: supply-chain
    spec:
      containers:
        - name: zot
          image: ghcr.io/project-zot/zot-linux-amd64:latest
          ports:
            - containerPort: 5000
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: autonomyx-registry
  namespace: autonomyx
  labels:
    autonomyx/pack: supply-chain
spec:
  selector:
    app: autonomyx-zot
  ports:
    - port: 5000
      targetPort: 5000

---
# ── Pack 7: OTel collector (observability — every gate emits a span) ──────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-config
  namespace: autonomyx
  labels:
    autonomyx/pack: observability
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: "0.0.0.0:4317" }
          http:  { endpoint: "0.0.0.0:4318" }
    exporters:
      debug:
        verbosity: normal
      # Add Prometheus, Jaeger, or Grafana exporters here
    service:
      pipelines:
        traces:
          receivers:  [otlp]
          exporters:  [debug]
        metrics:
          receivers:  [otlp]
          exporters:  [debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: autonomyx
  labels:
    app:            otel-collector
    autonomyx/pack: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app:            otel-collector
        autonomyx/pack: observability
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:latest
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - containerPort: 4317
            - containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/otel
          resources:
            requests: { cpu: 50m,  memory: 64Mi  }
            limits:   { cpu: 500m, memory: 256Mi }
      volumes:
        - name: config
          configMap: { name: otel-config }
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: autonomyx
  labels:
    autonomyx/pack: observability
spec:
  selector:
    app: otel-collector
  ports:
    - name: grpc
      port: 4317
    - name: http
      port: 4318

---
# ── Pack 8: Example AutonomyxAgent CRD — kagent-style, Autonomyx-governed ─────
# kagent uses YAML CRDs. Autonomyx does too — plus DID, gates, governance, fabric.
apiVersion: autonomyx.io/v1alpha1
kind: AutonomyxAgent
metadata:
  name: research-agent
  namespace: autonomyx
  labels:
    autonomyx/pack: example
  annotations:
    autonomyx/inspired-by: "kagent pattern — declarative YAML, but with DID + governance"
spec:
  name: Research Agent
  description: "Researches topics and synthesises findings. End-to-end delivery agent."
  version: "0.1.0"
  intelligence:
    provider: anthropic
    model:    claude-opus-4-8
    mode:     adaptive
    apiKeyEnv: ANTHROPIC_API_KEY
  governance:
    maxGrantTtlSecs:    3600
    allowedCapabilities: ["research:read", "web:search", "run:execute"]
    auditAll:           true
    federationLevel:    local
  tools:
    - name: web_search
    - name: summarise
  budget:
    monthlyUsd: 20.00
    onExceed:   pause
  deploy:
    target:    k3s
    namespace: autonomyx

---
# ── Pack 9: Example AutonomyxApplication — the product ───────────────────────
apiVersion: autonomyx.io/v1alpha1
kind: AutonomyxApplication
metadata:
  name: my-first-app
  namespace: autonomyx
  labels:
    autonomyx/pack: example
spec:
  name: MyFirstApp
  description: "Built on Autonomyx. End to end. Nothing missing."
  version: "0.1.0"
  agents:
    - name: researcher
      ref:  research-agent
      role: "research and synthesise"
  lifecycle:
    gates:
      - stage: build
        oath:  bom_present
      - stage: sign
        oath:  signature_valid
      - stage: deploy
        oath:  governance_satisfied
      - stage: run
        oath:  budget_available
  budget:
    monthlyUsd: 50.00
    onExceed:   pause
  deploy:
    target:    k3s
    namespace: autonomyx

---
# ── Pack 10: HPA + PDB — production scale ────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: autonomyx-runner
  namespace: autonomyx
  labels:
    autonomyx/pack: scale
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind:       Deployment
    name:       autonomyx-runner
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: autonomyx-runner
  namespace: autonomyx
  labels:
    autonomyx/pack: scale
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: autonomyx-runner
