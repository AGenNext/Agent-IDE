{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts: [{{ .Values.ingress.host | quote }}]
      secretName: {{ .Release.Name }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Backend: API + WebSocket (gated — ingress through Traefik only)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-backend
                port: { number: 3001 }
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-backend
                port: { number: 3001 }
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-backend
                port: { number: 3001 }
          - path: /transfer
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-backend
                port: { number: 3001 }
          # IDE: everything else
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-ide
                port: { number: 3000 }
{{- end }}
