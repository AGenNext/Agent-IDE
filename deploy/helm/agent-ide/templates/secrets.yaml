{{- if or .Values.secrets.anthropicApiKey .Values.secrets.openaiApiKey .Values.secrets.transferApiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  {{- if .Values.secrets.anthropicApiKey }}
  anthropicApiKey: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  openaiApiKey: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.transferApiKey }}
  transferApiKey: {{ .Values.secrets.transferApiKey | quote }}
  {{- end }}
{{- end }}
