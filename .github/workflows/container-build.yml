name: Container Build & Deploy

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/agent-ide-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile.backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-ide:
    name: Build IDE image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (ide)
        id: meta-ide
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/agent-ide
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push IDE
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile.ide
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-ide.outputs.tags }}
          labels: ${{ steps.meta-ide.outputs.labels }}
          cache-from: type=gha,scope=ide
          cache-to: type=gha,mode=max,scope=ide

  build-combined:
    name: Build combined image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (combined)
        id: meta-combined
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/agent-ide-combined
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push combined
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-combined.outputs.tags }}
          labels: ${{ steps.meta-combined.outputs.labels }}
          cache-from: type=gha,scope=combined
          cache-to: type=gha,mode=max,scope=combined

  deploy:
    name: Rollout to Kubernetes
    runs-on: ubuntu-latest
    needs: [build-backend, build-ide]
    # Only deploy on push (not PRs); requires KUBECONFIG secret to be set
    if: github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true'
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Write kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Set image tag
        id: tag
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Rollout backend
        run: |
          kubectl set image deployment/${{ vars.HELM_RELEASE }}-agent-ide-backend \
            backend=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/agent-ide-backend:${{ steps.tag.outputs.tag }} \
            -n ${{ vars.K8S_NAMESPACE || 'agent-ide' }}
          kubectl rollout status deployment/${{ vars.HELM_RELEASE }}-agent-ide-backend \
            -n ${{ vars.K8S_NAMESPACE || 'agent-ide' }} --timeout=5m

      - name: Rollout IDE
        run: |
          kubectl set image deployment/${{ vars.HELM_RELEASE }}-agent-ide-ide \
            ide=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/agent-ide:${{ steps.tag.outputs.tag }} \
            -n ${{ vars.K8S_NAMESPACE || 'agent-ide' }}
          kubectl rollout status deployment/${{ vars.HELM_RELEASE }}-agent-ide-ide \
            -n ${{ vars.K8S_NAMESPACE || 'agent-ide' }} --timeout=5m
