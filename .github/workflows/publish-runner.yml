name: Publish Runner

# Builds the Rust agent-runner binary + Docker image and publishes to:
#   - ghcr.io/agennext/autonomyx-runner   (Docker)
#   - GitHub Releases                      (binary tarballs for install.sh)
#
# Triggers:
#   - Push to main       → :latest tag + sha tag
#   - Semver tag v*.*.*  → :v1.2.3 + :1.2 + :latest
#   - Manual dispatch    → build + push without release assets

on:
  push:
    branches: [main]
    paths:
      - "packages/agent-runner/**"
      - ".github/workflows/publish-runner.yml"
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE:    ghcr.io/${{ github.repository_owner }}/autonomyx-runner

jobs:
  # ── 1. Build binaries for linux/x86_64 and linux/aarch64 ───────────────────
  binary:
    name: Build binary (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target:  x86_64-unknown-linux-musl
            runner:  ubuntu-latest
            os:      linux
            arch:    x86_64
          - target:  aarch64-unknown-linux-musl
            runner:  ubuntu-latest
            os:      linux
            arch:    aarch64

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Rust + musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compiler (aarch64)
        if: matrix.arch == 'aarch64'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/agent-runner/target
          key: runner-${{ matrix.target }}-${{ hashFiles('packages/agent-runner/Cargo.lock') }}
          restore-keys: runner-${{ matrix.target }}-

      - name: Build
        working-directory: packages/agent-runner
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --locked --target ${{ matrix.target }}
          strip target/${{ matrix.target }}/release/autonomyx-runner || true

      - name: Package tarball
        working-directory: packages/agent-runner
        run: |
          TARBALL="autonomyx-runner-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
          cp target/${{ matrix.target }}/release/autonomyx-runner ./autonomyx-runner
          tar -czf "$TARBALL" autonomyx-runner
          echo "TARBALL=$TARBALL" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b
        with:
          name: binary-${{ matrix.os }}-${{ matrix.arch }}
          path: packages/agent-runner/${{ env.TARBALL }}
          retention-days: 7

  # ── 2. Build + push Docker image ────────────────────────────────────────────
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff9f10d97c99b358dc3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226

      - name: Log in to GHCR
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09
        with:
          context:   packages/agent-runner
          file:      packages/agent-runner/Dockerfile
          platforms: linux/amd64,linux/arm64
          push:      true
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3. GitHub Release with binary assets ────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [binary, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Download all binaries
        uses: actions/download-artifact@fa0a91b85d4f404e444306525c4a53539c831b21
        with:
          pattern: binary-*
          merge-multiple: true
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Autonomyx ${{ github.ref_name }}"
          body: |
            ## Install

            **One-line install (Docker, recommended):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/agennext/agent-ide/${{ github.ref_name }}/install.sh | bash
            ```

            **Binary install (no Docker required):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/agennext/agent-ide/${{ github.ref_name }}/install.sh | bash -s -- --mode binary
            ```

            **Switch model at runtime (no restart):**
            ```bash
            curl -X PUT http://localhost:3001/api/providers/config \
              -d '{"default_model":"gpt-4o"}'
            ```

            **Docker image:**
            ```
            ghcr.io/agennext/autonomyx-runner:${{ github.ref_name }}
            ```
          files: dist/*.tar.gz
          draft: false
          prerelease: false
