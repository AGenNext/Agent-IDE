name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "claude/**"
      - "post-merge-**"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build all workspaces
        run: yarn build

      - name: Typecheck all workspaces
        run: yarn typecheck

      - name: Lint all workspaces
        run: yarn lint

  container:
    name: Build container
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container image
        run: docker build -f Containerfile -t agent-ide:ci .

  production-readiness:
    name: Production readiness check
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify production readiness docs
        run: |
          test -f docs/THEIA_AI_INTEGRATION.md
          test -f docs/PRODUCTION_READINESS.md

      - name: Verify Theia AI dependency alignment
        run: |
          node <<'NODE'
          const fs = require('fs');
          const browser = JSON.parse(fs.readFileSync('applications/browser-app/package.json', 'utf8'));
          const core = JSON.parse(fs.readFileSync('extensions/agent-ide-core/package.json', 'utf8'));
          const expected = '1.73.0';
          const required = [
            '@theia/core',
            '@theia/ai-core',
            '@theia/ai-chat',
            '@theia/ai-ide',
            '@theia/ai-mcp',
            '@theia/ai-terminal',
            '@theia/ai-openai',
            '@theia/ai-anthropic',
            '@theia/ai-google',
            '@theia/ai-ollama'
          ];
          const failures = [];
          for (const pkg of required) {
            if (browser.dependencies[pkg] !== expected) failures.push(`${pkg}=${browser.dependencies[pkg]}`);
          }
          if (core.dependencies['@theia/core'] !== expected) failures.push(`core-extension @theia/core=${core.dependencies['@theia/core']}`);
          if (failures.length) {
            console.error(`Theia dependency alignment failed: ${failures.join(', ')}`);
            process.exit(1);
          }
          NODE
