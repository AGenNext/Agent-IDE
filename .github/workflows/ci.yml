name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Build all packages
        run: yarn build

      - name: Lint (if available)
        run: yarn lint || echo 'Lint step skipped (eslint deps not installed globally)'
        continue-on-error: true

      - name: Typecheck
        run: yarn typecheck || echo 'Typecheck skipped'
        continue-on-error: true
