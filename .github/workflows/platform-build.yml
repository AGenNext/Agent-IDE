name: Platform Build

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE:    ghcr.io/${{ github.repository_owner }}/agent-ide

jobs:

  # ── Rust agent-runner: native binaries for all targets ──────────────────────
  rust-binaries:
    name: Rust (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: agent-runner-linux-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: agent-runner-linux-arm64
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: agent-runner-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: agent-runner-darwin-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux cross-compile)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        working-directory: packages/agent-runner
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Rename binary
        run: |
          cp packages/agent-runner/target/${{ matrix.target }}/release/agent-runner \
             ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Container image: Phase 1 (Node) + Phase 2 (Rust) ────────────────────────
  container:
    name: Container image
    runs-on: ubuntu-latest
    needs: rust-binaries
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux AMD64 binary
        uses: actions/download-artifact@v4
        with:
          name: agent-runner-linux-amd64
          path: packages/agent-runner/target/release/

      - run: |
          mv packages/agent-runner/target/release/agent-runner-linux-amd64 \
             packages/agent-runner/target/release/agent-runner
          chmod +x packages/agent-runner/target/release/agent-runner

      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── GitHub Release: attach native binaries ───────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: rust-binaries
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

  # ── Kubernetes deploy ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: container
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install KubeContainer operator
        run: |
          kubectl apply -f https://github.com/unboxd-agency/KubeContainer/releases/download/v0.1.0/install.yaml
          kubectl wait --for=condition=available deployment/kubecontainer-controller-manager \
            -n kubecontainer-system --timeout=120s || true

      - name: Apply namespace + config
        run: |
          kubectl apply -f deploy/k3s.yaml

      - name: Apply KubeContainer
        run: |
          # Patch image tag to current SHA
          sed "s|ghcr.io/agennext/agent-ide:main|${{ env.IMAGE }}:sha-${{ github.sha }}|g" \
            deploy/kubecontainer.yaml | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/agent-ide -n agent-ide --timeout=5m || \
          kubectl rollout status kubecontainer/agent-ide -n agent-ide --timeout=5m || true

      - name: Print URL
        run: |
          echo "Deployed: https://${{ vars.APP_DOMAIN || 'ide.agennext.com' }}"
