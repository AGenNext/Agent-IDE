apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agent-ide-backend-data
  namespace: agent-ide
  labels:
    app.kubernetes.io/name: agent-ide
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: kustomize
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # storageClassName is omitted to use the cluster default storage class.
  # Override in overlays if needed.
