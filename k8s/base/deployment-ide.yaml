apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-ide-ide
  namespace: agent-ide
  labels:
    app.kubernetes.io/name: agent-ide
    app.kubernetes.io/component: ide
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-ide
      app.kubernetes.io/component: ide
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-ide
        app.kubernetes.io/component: ide
    spec:
      serviceAccountName: agent-ide
      containers:
        - name: ide
          image: agennext/agent-ide:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: BACKEND_URL
              value: "http://agent-ide-backend:3001"
            - name: NODE_ENV
              value: "production"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
