apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Development overlay: single replicas, latest tags, no resource limits.
namePrefix: dev-

resources:
  - ../../base

images:
  - name: agennext/agent-ide-backend
    newTag: latest
  - name: agennext/agent-ide
    newTag: latest

patches:
  # Scale backend to 1 replica
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: agent-ide-backend

  # Scale IDE to 1 replica
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: agent-ide-ide

  # Remove resource limits from backend for dev ergonomics
  - patch: |-
      - op: remove
        path: /spec/template/spec/containers/0/resources/limits
    target:
      kind: Deployment
      name: agent-ide-backend

  # Remove resource limits from IDE for dev ergonomics
  - patch: |-
      - op: remove
        path: /spec/template/spec/containers/0/resources/limits
    target:
      kind: Deployment
      name: agent-ide-ide
