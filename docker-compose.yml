services:
  # ── Autonomyx Runner — FSM engine + API + live dashboard ─────────────────────
  runner:
    image: ghcr.io/agennext/autonomyx-runner:latest
    build:
      context: packages/agent-runner
      dockerfile: Dockerfile
    ports:
      - "3001:3001"           # Platform API + ECharts dashboard at /
    env_file:
      - path: .env
        required: false
    environment:
      RUST_LOG: "info,agent_runner=debug"
      PORT: "3001"
      GATEWAY_API_KEY: "${GATEWAY_API_KEY}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      # Point at SurrealDB (kv-mem default; set CONFIGDB_PATH for persistent RocksDB)
      CONFIGDB_PATH: "${CONFIGDB_PATH:-}"
      # Identity
      ACTOR_DID: "${ACTOR_DID:-did:autonomyx:runner}"
      NODE_DID:  "${NODE_DID:-did:autonomyx:node:0}"
    volumes:
      - runner-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Agent IDE — Theia browser IDE (VS Code-compatible) ───────────────────────
  agent-ide:
    image: ghcr.io/agennext/agent-ide:main
    build:
      context: .
      dockerfile: Containerfile
    ports:
      - "3000:3000"           # Theia IDE UI
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: "3000"
      WORKSPACE_ROOT: /data/workspace
      RUNNER_URL: "http://runner:3001"
    volumes:
      - agent-ide-data:/data
    depends_on:
      runner:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Metabase — headless analytics dashboard ────────────────────────────────
  # Connects to the runner's /api/metrics endpoint via the HTTP data source.
  # Access: http://<host>:4000
  # First-run: complete setup at http://<host>:4000/setup
  # Add data source: "Custom HTTP API" → http://runner:3001/api/metrics
  metabase:
    image: metabase/metabase:v0.50.31
    ports:
      - "4000:3000"           # Metabase UI
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
      # Embedding (headless mode) — generate secret in Metabase Admin → Embedding
      MB_EMBEDDING_SECRET_KEY: "${METABASE_EMBEDDING_SECRET:-}"
      JAVA_TOOL_OPTIONS: "-Xmx512m"
    volumes:
      - metabase-data:/metabase-data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

volumes:
  runner-data:
  agent-ide-data:
  metabase-data:
