version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Containerfile.backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - workspace_root:/workspace/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ide:
    build:
      context: .
      dockerfile: Containerfile.ide
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - backend
      - ide
    restart: unless-stopped
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf

configs:
  nginx_conf:
    content: |
      upstream backend {
          server backend:3001;
      }
      upstream ide {
          server ide:3000;
      }
      server {
          listen 80;
          server_name _;

          # Increase timeout for WebSocket connections
          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;

          # WebSocket upgrade headers
          proxy_http_version 1.1;
          proxy_set_header Upgrade $$http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;

          location /api {
              proxy_pass http://backend;
          }

          location /ws {
              proxy_pass http://backend;
          }

          location / {
              proxy_pass http://ide;
          }
      }

volumes:
  workspace_root:
